<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhapara Ramadan Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav role="navigation">
        <div id="menuToggle">
            <input type="checkbox" />
            <span></span>
            <span></span>
            <span></span>
            <ul id="menu">
                <a href="#"><li>Home</li></a>
                <a href="#"><li>Full Timetable</li></a>
                <a href="#"><li>Qibla Compass</li></a>
                <a href="#"><li>Settings</li></a>
            </ul>
        </div>
    </nav>

    
    <header>
        <div class="location-date metallic-text">
            <p>📍 Chhapara, Seoni</p>
            <p id="hijri-date">Loading date...</p>
        </div>
        
        <img src="kalma-image.jpg" alt="Kalmah" class="kalmah-img">
    </header>

    <main>
        <section class="swipe-wrapper">
            <div class="swipe-container" id="clock-slider">
                <div class="swipe-item">
                    <div id="eng-clock" class="neon-clock">00:00:00</div>
                </div>
                <div class="swipe-item">
                    <div id="urdu-clock" class="neon-clock urdu-text">٠٠:٠٠:٠٠</div>
                </div>
            </div>
            <div class="swipe-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
            </div>
        </section>

        <section class="event-container metallic-text">
            <h2 id="next-event">Loading...</h2>
            <div id="countdown" class="neon-clock small-neon">00:00:00</div>
            <p id="target-time">Time: --:--</p>
        </section>

        <section class="dua-container metallic-text">
            <h3 id="dua-title">Dua</h3>
            <p id="dua-arabic" class="arabic-text"></p>
            <p id="dua-translit" class="translit-text"></p>
            <p id="dua-translat" class="translat-text"></p>
        </section>

        <section class="tasbeeh-container metallic-text">
            <h3>Quick Tasbeeh</h3>
            <div id="tasbeeh-count" class="counter-display">0</div>
            <button id="tasbeeh-btn" class="metallic-btn">Tap (SubhanAllah)</button>
            <button id="reset-btn" class="reset-btn">Reset</button>
        </section>
    </main>

    <audio id="azan-audio" src="azan.mp3"></audio>
    <script src="script.js"></script>
</body>
                              </html>
